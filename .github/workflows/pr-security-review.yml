name: PR Security Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code security review
        uses: anthropics/claude-code-action@v1
        with:
          prompt: /security-review
          anthropic_api_key: ${{ secrets.CLAUDE_KEY }}
