name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (patch, minor, major) or explicit version (e.g. 0.3.0)'
        required: true
        default: 'patch'
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run tests
        run: npm test

      - name: Bump version
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog via Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_KEY }}
        run: |
          cat <<'PROMPT' | claude -p --allowedTools 'Bash(git:*)' Edit Write Read
          You are updating the changelog for a release in CI.

          The new version is: ${{ steps.version.outputs.version }}
          Today's date is: $(date +%Y-%m-%d)

          Generate release notes and prepend them to CHANGELOG.md:
          - Find the previous version tag: run 'git tag --list "v*" --sort=-version:refname'. The previous tag is the first tag that is NOT v${{ steps.version.outputs.version }}. If no previous tag exists, use the root commit.
          - Collect commits between the previous tag and HEAD using 'git log <range> --pretty=format:"%H %s" --no-merges'.
          - Filter out commits that are NOT user-facing (changelog is for end users of the app, not contributors). For each commit, inspect its changed files via 'git show --name-only --pretty=format: <sha>'. Exclude a commit if ALL of its changed files fall within these paths/patterns:
            - '.github/' (workflows, actions, issue templates, PR templates)
            - '.claude/', '.codex/' (agent/tooling config)
            - Repo meta/docs: 'README.md', 'CLAUDE.md', 'AGENTS.md', 'MARKETING.md', 'CHANGELOG.md', 'LICENSE', any other top-level '*.md'
            - Lint/format/CI config: '.eslintrc*', '.prettierrc*', '.editorconfig', '.nvmrc', '.gitignore', '.gitattributes'
          - Also exclude commits whose subject starts with (case-insensitive): 'ci:', 'ci(', 'chore(ci', 'docs:', 'docs(', 'build(ci', 'release:', 'release(', 'chore(release'.
          - If a commit touches BOTH excluded paths and app code (e.g. 'src/'), keep it — it's user-facing.
          - From the remaining commits, categorize by subject prefix:
            - Features: commits starting with add, feat, implement, introduce, support (case-insensitive)
            - Fixes: commits starting with fix, resolve, patch, correct (case-insensitive)
            - Changes: everything else
          - Strip the prefix keyword and capitalize the first letter of each entry.
          - Format as: '## [${{ steps.version.outputs.version }}] - <YYYY-MM-DD>' followed by sections (Features, Fixes, Changes). Omit empty sections.
          - If CHANGELOG.md doesn't exist, create it with header '# Changelog' and a blank line.
          - Prepend the new entry after the header. Do NOT duplicate if one for this version already exists.

          Do NOT commit, tag, or push. Only update CHANGELOG.md.
          PROMPT

      - name: Verify changelog
        run: grep -q '## \[${{ steps.version.outputs.version }}\]' CHANGELOG.md

      - name: Extract release notes
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{found=1; next} /^## \[/{if(found) exit} found' CHANGELOG.md > RELEASE_NOTES.md
          echo "Extracted release notes:"
          cat RELEASE_NOTES.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

      - name: Commit release
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "release: v${{ steps.version.outputs.version }}"

      - name: Create annotated tag
        run: git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"

      - name: Get tag name
        id: get-tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify tag exists
        run: git rev-parse "${{ steps.get-tag.outputs.tag }}" > /dev/null

      - name: Push commit and tag
        run: |
          git push origin main
          git push origin "${{ steps.get-tag.outputs.tag }}"

  build:
    needs: [prepare]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Build and publish
        run: npm run build && npx electron-builder --publish always --arm64 --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Update release notes
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: [prepare]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Build and publish
        run: npm run build && npx electron-builder --linux --publish always --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: [prepare, build, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
